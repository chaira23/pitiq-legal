<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shared F1 Fantasy Team — PitIQ</title>
  <meta property="og:title" content="Check out my F1 Fantasy team" />
  <meta property="og:description" content="Open in PitIQ to import this team into your own lineup." />
  <meta property="og:type" content="website" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0B0E13; --bg2: #131720; --card: #161c28;
      --accent: #E83D2C; --accent-soft: rgba(232,61,44,0.12);
      --text: #F2F4F8; --text2: #8892A4; --text3: #5B6478;
      --border: rgba(255,255,255,0.07);
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .logo { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 2.5rem; }
    .logo span { color: var(--accent); }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem 2rem 1.8rem;
      max-width: 360px;
      width: 100%;
    }
    .icon {
      width: 56px; height: 56px;
      border-radius: 14px;
      background: var(--accent-soft);
      border: 1px solid rgba(232,61,44,0.2);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.2rem;
      font-size: 1.6rem;
    }
    h1 { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
    .sub { font-size: 0.9rem; color: var(--text2); line-height: 1.6; margin-bottom: 1.6rem; }
    .drivers { display: flex; flex-wrap: wrap; gap: 0.4rem; justify-content: center; margin-bottom: 1.6rem; }
    .driver-chip {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.25rem 0.7rem;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: var(--text2);
    }
    .driver-chip.captain { color: #F5B83D; border-color: rgba(245,184,61,0.3); background: rgba(245,184,61,0.08); }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      background: var(--accent);
      color: #fff;
      font-weight: 700; font-size: 1rem;
      padding: 0.85rem 1.8rem;
      border-radius: 12px;
      text-decoration: none;
      width: 100%;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.88; }
    .btn-secondary {
      display: flex; align-items: center; justify-content: center;
      background: transparent;
      color: var(--text2);
      font-weight: 600; font-size: 0.9rem;
      padding: 0.75rem 1.4rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      text-decoration: none;
      width: 100%;
      margin-top: 0.6rem;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-secondary:hover { border-color: var(--text3); color: var(--text); }
    .hint { font-size: 0.78rem; color: var(--text3); margin-top: 1.4rem; }
  </style>
</head>
<body>
  <div class="logo">Pit<span>IQ</span></div>

  <div class="card">
    <div class="icon">🏎</div>
    <h1>Shared F1 Fantasy Team</h1>
    <p class="sub">Someone shared their team with you. Open PitIQ to import it into your lineup with one tap.</p>

    <div class="drivers" id="drivers"></div>

    <a class="btn" id="open-btn" href="https://apps.apple.com/app/id6782202084">
      Open in PitIQ
    </a>
    <a class="btn-secondary" href="https://apps.apple.com/app/id6782202084">
      Download PitIQ — Free
    </a>
    <p class="hint">If PitIQ is already installed, tap "Open in PitIQ" and the team will import automatically.</p>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var d = params.get('d');
      var cap = params.get('cap');

      if (d) {
        var deepLink = 'pitiq://import-team?' + params.toString();
        document.getElementById('open-btn').href = deepLink;

        var drivers = d.split(',');
        var container = document.getElementById('drivers');
        drivers.forEach(function (id) {
          var code = id.replace(/_/g, ' ').split(' ').map(function (w) { return w[0].toUpperCase() + w.slice(1); }).join(' ');
          var chip = document.createElement('span');
          chip.className = 'driver-chip' + (id === cap ? ' captain' : '');
          chip.textContent = id === cap ? code + ' ©' : code;
          container.appendChild(chip);
        });

        setTimeout(function () { window.location.href = deepLink; }, 400);
      }
    })();
  </script>
</body>
</html>
