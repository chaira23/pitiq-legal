<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini-League Invite — PitIQ</title>
  <meta property="og:title" content="Join my PitIQ mini-league" />
  <meta property="og:description" content="Open in PitIQ to join and compare projected scores." />
  <meta property="og:type" content="website" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0B0E13; --bg2: #131720; --card: #161c28;
      --accent: #E83D2C; --accent-soft: rgba(232,61,44,0.12);
      --text: #F2F4F8; --text2: #8892A4; --text3: #5B6478;
      --border: rgba(255,255,255,0.07); --purple: #9B6DFF;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .logo { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 2.5rem; }
    .logo span { color: var(--accent); }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem 2rem 1.8rem;
      max-width: 360px;
      width: 100%;
    }
    .icon {
      width: 56px; height: 56px;
      border-radius: 14px;
      background: rgba(232,61,44,0.12);
      border: 1px solid rgba(232,61,44,0.2);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.2rem;
      font-size: 1.6rem;
    }
    h1 { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
    .sub { font-size: 0.9rem; color: var(--text2); line-height: 1.6; margin-bottom: 1.6rem; }
    .code-badge {
      display: inline-block;
      background: rgba(232,61,44,0.08);
      border: 2px solid rgba(232,61,44,0.35);
      border-radius: 12px;
      padding: 0.5rem 1.2rem;
      font-size: 1.2rem;
      font-weight: 900;
      letter-spacing: 3px;
      color: var(--accent);
      margin-bottom: 1.6rem;
    }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      background: var(--accent);
      color: #fff;
      font-weight: 700; font-size: 1rem;
      padding: 0.85rem 1.8rem;
      border-radius: 12px;
      text-decoration: none;
      width: 100%;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.88; }
    .btn-secondary {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      background: transparent;
      color: var(--text2);
      font-weight: 600; font-size: 0.9rem;
      padding: 0.75rem 1.4rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      text-decoration: none;
      width: 100%;
      margin-top: 0.6rem;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-secondary:hover { border-color: var(--text3); color: var(--text); }
    .hint { font-size: 0.78rem; color: var(--text3); margin-top: 1.4rem; }
  </style>
</head>
<body>
  <div class="logo">Pit<span>IQ</span></div>

  <div class="card">
    <div class="icon">🏆</div>
    <h1>Mini-League Invite</h1>
    <p class="sub">You've been invited to join a PitIQ fantasy racing mini-league. Open the app to join and compare projected scores.</p>

    <div class="code-badge" id="code-badge">------</div>

    <a class="btn" id="open-btn" href="https://apps.apple.com/app/id6782202084">
      Open in PitIQ
    </a>
    <a class="btn-secondary" href="https://apps.apple.com/app/id6782202084">
      Download PitIQ — Free
    </a>
    <p class="hint">If PitIQ is already installed, tap "Open in PitIQ" and it will launch directly with the code filled in.</p>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var code = params.get('code');

      if (code) {
        var deepLink = 'pitiq://league?' + params.toString();
        document.getElementById('open-btn').href = deepLink;
        document.getElementById('code-badge').textContent = code.toUpperCase();

        // Auto-open if the app is installed (no-op if it isn't).
        setTimeout(function () { window.location.href = deepLink; }, 400);
      }
    })();
  </script>
</body>
</html>
